name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Cross-repo goal-type parity: the committed Rust IntentGoalType enum must
  # match the published infrix-schema vocabulary. Fails on drift.
  sdkgen-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
      - run: go test ./... -count=1
        working-directory: tools/sdkgen

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
